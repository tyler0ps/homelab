apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sso-route
spec:
  parentRefs:
  - name: main-gateway
  hostnames:
  - "sso.tylerops.dev"
  rules:
  - backendRefs:
    - name: web-app-svc
      port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-svc
spec:
  type: ClusterIP
  selector:
    app: web-app
  ports:
  - port: 80
    targetPort: 80